name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          package.json
          pnpm-lock.yaml
          src
          android
          public
          vite.config.ts
          index.html
          tailwind.config.js
          tsconfig.json
          capacitor.config.ts
    
    - name: Check files
      run: |
        echo "=== Current directory ==="
        pwd
        echo ""
        echo "=== All files ==="
        ls -la
        echo ""
        echo "=== package.json content ==="
        head -10 package.json
        echo ""
        echo "=== src folder ==="
        ls -la src/ || echo "No src folder"
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: pnpm install --prefer-offline
    
    - name: Build web app
      run: pnpm run build
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Build debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sigma-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
